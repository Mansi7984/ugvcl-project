<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- Gujarati Font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Noto Sans Gujarati', Arial;
    background: #eaeaea;
}

/* TOP BAR */
.topbar {
    background: #2f2f2f;
    color: white;
    text-align: center;
    padding: 12px;
    font-size: 16px;
}

/* COMPANY HEADER */
.company-header {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}

.company-card {
    background: #ffffff; /* PURE WHITE */
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15); /* softer premium shadow */
}

/* FLEX CONTENT */
.company-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* LOGO */
.company-logo {
    width: 40px;
}

/* TEXT */
.company-text {
    font-size: 14px;
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}

/* CARD */
.card {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 12px;
}

/* TITLE */
.title {
    text-align: center;
    font-weight: bold;
    margin-bottom: 15px;
}

/* COMMON */
.common {
    width: 100%;
    margin: 10px 0;
    border-radius: 10px;
    box-sizing: border-box;
}

/* INPUT */
.input {
    padding: 14px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* CAPTCHA */
.captcha-box {
    height: 70px;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
}

#captchaCanvas {
    width: 100%;
    height: 60px;
}

/* BUTTON */
.btn {
    padding: 13px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.green { background: #28a745; color: white; }
.red { background: #dc3545; color: white; }

.btn:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    Quick Pay UGVCL
</div>

<!-- COMPANY HEADER WITH LOGO -->
<div class="company-header">
    <div class="company-card">

        <div class="company-content">
            <img src="logo1.png" class="company-logo">

            <div class="company-text">
                <b>UTTAR GUJARAT VIJ COMPANY LIMITED</b><br>
                (UGVCL)
            </div>
        </div>

    </div>
</div>

<!-- MAIN -->
<div class="container">

<div class="card">

<div class="title">
    Enter Consumer No.<br>
    (ગ્રાહક નંબર દાખલ કરો.)
</div>

<input id="cno" class="input common"
placeholder="Enter 11 or 5 digit no. (૧૧ અથવા ૫ અંકનો નંબર દાખલ કરો)">

<!-- CAPTCHA -->
<div class="captcha-box common">
    <canvas id="captchaCanvas"></canvas>
</div>

<input id="captchaInput" class="input common"
placeholder="Enter image as shown (ચિત્ર મુજબ દાખલ કરો)">

<button class="btn green common" onclick="check()">
    Check Consumer No. (ગ્રાહક નંબર તપાસો)
</button>

<button class="btn red common" onclick="generateCaptcha()">
    Reload (ફરીથી લોડ કરો)
</button>

</div>

</div>

<script>
let captchaText = "";

/* CAPTCHA */
function generateCaptcha() {
    const canvas = document.getElementById("captchaCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 300;
    canvas.height = 60;

    let chars = "ABCDEFGH123456";
    captchaText = "";

    for (let i = 0; i < 5; i++) {
        captchaText += chars[Math.floor(Math.random()*chars.length)];
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#ddd";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.font = "28px Arial";
    ctx.fillStyle = "#000";
    ctx.textAlign = "center";
    ctx.fillText(captchaText, canvas.width/2, 40);

    // noise lines
    for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(Math.random()*300, Math.random()*60);
        ctx.lineTo(Math.random()*300, Math.random()*60);
        ctx.strokeStyle = "blue";
        ctx.stroke();
    }
}

generateCaptcha();

/* CHECK */
function check() {
    let cno = document.getElementById("cno").value;
    let userCaptcha = document.getElementById("captchaInput").value;

    if(cno.length !== 11 && cno.length !== 5) {
        alert("Invalid Consumer Number / અમાન્ય નંબર");
        return;
    }

    if(userCaptcha !== captchaText) {
        alert("Wrong Captcha / ખોટો કૅપ્ચા");
        generateCaptcha();
        return;
    }

    alert("Success ✅ / સફળ");
}
</script>

</body>
</html>
